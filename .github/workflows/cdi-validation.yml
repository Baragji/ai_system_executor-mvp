name: CDI Validation

# Contract-Driven Integration validation checks
# Enforces: contract schema validation, SBOM generation, stack compliance

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  contract-schema:
    name: Contract Schema Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Validate contract schemas
        run: npm run contract:check
      
      - name: Upload validation report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: contract-validation-errors
          path: |
            contracts/
            .automation/

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate SBOM (production only)
        run: npm run sbom
      
      - name: Verify SBOM exists
        run: |
          if [ ! -f sbom.spdx.json ]; then
            echo "❌ SBOM file not generated"
            exit 1
          fi
          echo "✅ SBOM generated successfully"
      
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90
      
      - name: SBOM summary
        run: |
          echo "## SBOM Generated 📦" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Format: SPDX JSON" >> $GITHUB_STEP_SUMMARY
          echo "- Size: $(du -h sbom.spdx.json | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "- Packages: $(grep -c '"name"' sbom.spdx.json || echo 'N/A')" >> $GITHUB_STEP_SUMMARY

  stack-compliance:
    name: Stack Compliance Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Verify ai-stack.json exists
        run: |
          if [ ! -f ai-stack.json ]; then
            echo "❌ ai-stack.json not found"
            echo "Stack lock file is required for compliance enforcement"
            exit 1
          fi
          echo "✅ Stack lock file found"
      
      - name: Check for forbidden Python files
        run: |
          if find . -name "*.py" -not -path "./node_modules/*" -not -path "./.git/*" | grep -q .; then
            echo "❌ Python files detected - forbidden by ai-stack.json"
            find . -name "*.py" -not -path "./node_modules/*" -not -path "./.git/*"
            exit 1
          fi
          echo "✅ No forbidden Python files"
      
      - name: Check frontend location compliance
        run: |
          # Check for JavaScript files outside /public (excluding node_modules, dist, .git)
          if find . \( -name "*.jsx" -o -name "*.tsx" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/dist/*" \
            -not -path "*/.git/*" \
            -not -path "*/public/*" \
            | grep -q .; then
            echo "⚠️  Warning: React/JSX files found outside /public"
            find . \( -name "*.jsx" -o -name "*.tsx" \) \
              -not -path "*/node_modules/*" \
              -not -path "*/dist/*" \
              -not -path "*/.git/*" \
              -not -path "*/public/*"
          fi
          echo "✅ Frontend location check complete"
      
      - name: Verify protected files unchanged (if in PR)
        if: github.event_name == 'pull_request'
        run: |
          echo "Checking for changes to protected files..."
          PROTECTED_FILES="ai-stack.json .github/copilot-instructions.md .github/workflows/ contracts/schemas/ .github/CODEOWNERS"
          
          CHANGED=false
          for file in $PROTECTED_FILES; do
            if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^$file"; then
              echo "⚠️  Protected file modified: $file"
              echo "This change requires CODEOWNERS approval"
              CHANGED=true
            fi
          done
          
          if [ "$CHANGED" = true ]; then
            echo "::notice::Protected files were modified. Ensure CODEOWNERS approval."
          fi

  evidence-check:
    name: Evidence Artifacts Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check for discovery artifacts
        run: |
          echo "Checking for discovery artifacts..."
          
          # Look for discovery files
          DISCOVERY_FILES=$(find .automation -name "*_discovery.json" -o -name "*_discovery_note.md" 2>/dev/null || echo "")
          
          if [ -n "$DISCOVERY_FILES" ]; then
            echo "✅ Discovery artifacts found:"
            echo "$DISCOVERY_FILES"
          else
            echo "ℹ️  No discovery artifacts found (may not be required for this PR)"
          fi
      
      - name: Check PR description for evidence
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "Checking PR description for evidence sections..."
          
          if echo "$PR_BODY" | grep -qi "discovery note"; then
            echo "✅ PR contains discovery note section"
          else
            echo "ℹ️  No discovery note section in PR (may not be required)"
          fi
          
          if echo "$PR_BODY" | grep -qi "evidence"; then
            echo "✅ PR contains evidence section"
          else
            echo "ℹ️  No evidence section in PR (may not be required)"
          fi

  cdi-summary:
    name: CDI Validation Summary
    runs-on: ubuntu-latest
    needs: [contract-schema, sbom, stack-compliance]
    if: always()
    
    steps:
      - name: Summary
        run: |
          echo "## CDI Validation Results 🔍" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Schema | ${{ needs.contract-schema.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM Generation | ${{ needs.sbom.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Stack Compliance | ${{ needs.stack-compliance.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.contract-schema.result }}" != "success" ] || [ "${{ needs.sbom.result }}" != "success" ] || [ "${{ needs.stack-compliance.result }}" != "success" ]; then
            echo "⚠️ Some CDI checks failed. Review the logs above." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          echo "✅ All CDI validation checks passed" >> $GITHUB_STEP_SUMMARY
