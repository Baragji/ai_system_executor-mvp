name: UI Validation

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    name: Playwright Visual & A11y Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: false

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: .automation/playwright-report/
          retention-days: 7

      - name: Upload Playwright Results JSON
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: .automation/playwright-results.json
          retention-days: 7

      - name: Upload Test Artifacts (Screenshots/Videos)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-artifacts
          path: |
            test-results/
            .automation/playwright-report/
          retention-days: 7

  lighthouse-ci:
    name: Lighthouse Performance & SEO
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run Lighthouse CI
        run: |
          mkdir -p .automation/lighthouse-reports
          npx lhci autorun --config=lighthouserc.js
        continue-on-error: false

      - name: Upload Lighthouse Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: .automation/lighthouse-reports/
          retention-days: 7

  ui-compliance-report:
    name: Generate UI Compliance Report
    runs-on: ubuntu-latest
    needs: [playwright-tests, lighthouse-ci]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Playwright Results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: playwright-results
          path: .automation/

      - name: Download Lighthouse Reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: lighthouse-reports
          path: .automation/lighthouse-reports/

      - name: Generate UI Compliance Report
        run: |
          mkdir -p .automation
          cat > .automation/ui_compliance_report.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow_run": "${{ github.run_id }}",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "playwright_status": "${{ needs.playwright-tests.result }}",
            "lighthouse_status": "${{ needs.lighthouse-ci.result }}",
            "overall_status": "${{ (needs.playwright-tests.result == 'success' && needs.lighthouse-ci.result == 'success') && 'pass' || 'fail' }}",
            "report_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

      - name: Upload UI Compliance Report
        uses: actions/upload-artifact@v4
        with:
          name: ui-compliance-report
          path: .automation/ui_compliance_report.json
          retention-days: 30
