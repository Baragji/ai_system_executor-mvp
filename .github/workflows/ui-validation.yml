name: UI Validation

on:
  pull_request:
  push:
    branches: [ main, '**' ]

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright Visual & A11y Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: "Diagnostics: list repo root"
        run: |
          pwd
          ls -la

      - name: Install dependencies (incl. dev)
        shell: bash
        run: |
          set -euo pipefail
          echo "Node version:" && node -v
          echo "npm version:" && npm -v
          if [ -f pnpm-lock.yaml ]; then
            echo "Detected pnpm-lock.yaml → using pnpm"
            npm i -g pnpm
            pnpm install --frozen-lockfile
          elif [ -f package.json ] && [ -f package-lock.json ] && grep -q '"lockfileVersion"' package-lock.json; then
            echo "Detected valid package-lock.json → running npm ci"
            npm ci
          else
            echo "Valid lockfile not found → falling back to npm install"
            npm install
          fi

      - name: Build server
        run: npm run build

      - name: Start server
        run: |
          nohup node dist/server.js > server.log 2>&1 &
          npx wait-on http://localhost:3000/healthz

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run UI tests
        run: npx playwright test -c playwright.config.ts --reporter=html

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7

  lighthouse:
    name: Lighthouse Performance & SEO
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: "Diagnostics: list repo root"
        run: |
          pwd
          ls -la

      - name: Install dependencies (incl. dev)
        shell: bash
        run: |
          set -euo pipefail
          echo "Node version:" && node -v
          echo "npm version:" && npm -v
          if [ -f pnpm-lock.yaml ]; then
            echo "Detected pnpm-lock.yaml → using pnpm"
            npm i -g pnpm
            pnpm install --frozen-lockfile
          elif [ -f package.json ] && [ -f package-lock.json ] && grep -q '"lockfileVersion"' package-lock.json; then
            echo "Detected valid package-lock.json → running npm ci"
            npm ci
          else
            echo "Valid lockfile not found → falling back to npm install"
            npm install
          fi

      - name: Build server
        run: npm run build

      - name: Start server
        run: |
          nohup node dist/server.js > server.log 2>&1 &
          npx wait-on http://localhost:3000/healthz

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/
          uploadArtifacts: false
          artifactName: lighthouseReports
          temporaryPublicStorage: true
          configPath: ''

      - name: Collect Lighthouse JSON reports
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p lighthouse-reports
          # Copy reports from common output folders
          if ls ./.lighthouseci/*.json >/dev/null 2>&1; then
            cp ./.lighthouseci/*.json lighthouse-reports/ || true
          fi
          if ls ./lighthouse-results/*.json >/dev/null 2>&1; then
            cp ./lighthouse-results/*.json lighthouse-reports/ || true
          fi
          echo "Collected $(ls -1 lighthouse-reports | wc -l) files into lighthouse-reports/"

      - name: Upload lighthouse artifacts (explicit)
        uses: actions/upload-artifact@v4
        with:
          name: lighthouseReports
          path: lighthouse-reports/
          retention-days: 7
          if-no-files-found: warn

  compliance:
    name: Generate UI Compliance Report
    runs-on: ubuntu-latest
    needs: [lighthouse]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download lighthouse artifacts
        uses: actions/download-artifact@v4
        with:
          name: lighthouseReports
          path: lighthouse-reports

      - name: Generate compliance summary
        run: node scripts/generate-ui-compliance.mjs
        env:
          LH_INPUT_DIR: lighthouse-reports
          OUTPUT_DIR: .automation

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: ui-compliance-report
          path: .automation/lighthouse-reports/
          retention-days: 7

